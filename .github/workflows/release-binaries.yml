name: Release Binaries

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-upload:
    name: Build and upload CLI binaries
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: stacksdapp-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: stacksdapp-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: stacksdapp-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: stacksdapp-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: |
          cargo build --release -p stacksdapp --bin stacksdapp --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          BIN_PATH="target/${{ matrix.target }}/release/stacksdapp"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_PATH="target/${{ matrix.target }}/release/stacksdapp.exe"
          fi
          cp "$BIN_PATH" "dist/${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

